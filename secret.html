<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Only for You ❤️</title>

<style>
body{
    text-align:center;
    font-family: Arial;
    background: radial-gradient(circle, #ffe6f0, #ffd6e8);
    padding:60px;
    overflow:hidden;
    color:#333;
}

/* intro text fade */
/* .typing{
    opacity:0;
    animation:fadeIn 2s forwards;
} */
 .typing {
  overflow: hidden;
  border-right: 3px solid #ff4da6;
  white-space: nowrap;
  margin: 15px auto;
  letter-spacing: .5px;
  width: 0;
}

/* typing animation timing */
.line1 { animation: typing 4s steps(40,end) forwards, blink .8s infinite; }
.line2 { animation: typing 4s steps(40,end) forwards 4.5s, blink .8s infinite 4.5s; }
.line3 { animation: typing 4s steps(40,end) forwards 9s, blink .8s infinite 9s; }
.line4 { animation: typing 4s steps(40,end) forwards 13.5s, blink .8s infinite 13.5s; }

@keyframes typing {
  from { width: 0 }
  to { width: 80% }
}

@keyframes blink {
  50% { border-color: transparent }
}
.typing:nth-child(2){animation-delay:2s;}
.typing:nth-child(3){animation-delay:4s;}
.typing:nth-child(4){animation-delay:6s;}

@keyframes fadeIn{
 from{opacity:0; transform:translateY(15px);}
 to{opacity:1; transform:translateY(0);}
}

/* heart */
.heart{
    font-size:42px;
    color:#ff4da6;
    animation:pulse 1.5s infinite;
    cursor:pointer;
}
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* signature */
#signature{
    opacity:0;
    margin-top:40px;
    font-size:24px;
    transition:opacity 2s;
}

/* languages */
#loveLanguages{
    font-size:20px;
    color:#c2185b;
    margin-top:8px;
    opacity:0;
    transition:opacity 2s;
}

/* back button */
#backBtn{
    margin-top:25px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ff4da6;
    color:white;
    font-size:16px;
    cursor:pointer;
    display:none;
}
#backBtn:hover{
    background:#e91e63;
}

/* stars */
.star{
    position:fixed;
    width:3px;height:3px;
    background:white;
    border-radius:50%;
    opacity:.8;
}

/* floating hearts */
.float-heart{
    position:fixed;
    bottom:-10px;
    color:#ff4da6;
    animation:floatUp 6s linear infinite;
}
@keyframes floatUp{
 from{transform:translateY(0);opacity:1}
 to{transform:translateY(-110vh);opacity:0}
}
</style>
</head>

<body>

<h1>Only for You, Hemant ❤️</h1>

<!-- <p class="typing">You didn’t just enter my life… you changed it forever.</p>
<p class="typing">Loving you is the most beautiful feeling I have ever known.</p>
<p class="typing">In your smile I find peace, in your arms I find home.</p>
<p class="typing">My heart will always choose you — <b>Today, Tomorrow, Always.</b></p> -->


<p class="typing line1">You didn’t just enter my life… you changed it forever.</p>

<p class="typing line2">Loving you is the most beautiful feeling I have ever known.</p>

<p class="typing line3">In your smile I find peace, in your arms I find home.</p>

<p class="typing line4">My heart will always choose you — <b>Today, Tomorrow, Always.</b></p>

<br><br>

<div class="heart" id="heartBtn">❤️</div>

<div id="signature">
Forever Yours,<br>
Sushmitha 💖
</div>

<div id="loveLanguages"></div>

<button id="backBtn" onclick="goHome()">⬅ Back to Home</button>

<script>
// show signature
setTimeout(()=>{
 document.getElementById("signature").style.opacity=1;
},9000);

// create stars
for(let i=0;i<40;i++){
 const s=document.createElement("div");
 s.className="star";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 document.body.appendChild(s);
}

// floating hearts
setInterval(()=>{
 const h=document.createElement("div");
 h.innerHTML="❤";
 h.className="float-heart";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},700);

// heart click ending
document.getElementById("heartBtn").addEventListener("click", function(e){
 e.stopPropagation();
 showLanguages();
});

function showLanguages(){

 const languages=[
   "I love you ❤️",
   "मैं तुमसे प्यार करती हूँ ❤️",
   "Nenu ninnu premisthunnanu ❤️",
   "Je t’aime ❤️",
   "Te amo ❤️",
   "Ich liebe dich ❤️",
   "Ti amo ❤️",
   "Aishiteru ❤️",
   "Saranghae ❤️"
 ];

 const box=document.getElementById("loveLanguages");
 box.style.opacity=1;

 let i=0;
 const interval=setInterval(()=>{
   if(i>=languages.length){
     clearInterval(interval);
     document.getElementById("backBtn").style.display="inline-block";
     return;
   }
   box.innerHTML=languages[i];
   i++;
 },2000);
}

// back to home page
function goHome(){
 window.location.href="homee.html";
}
</script>

</body>
</html>
